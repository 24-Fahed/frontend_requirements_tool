name: require-tools

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.10-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    image: require-tools:latest
    container_name: require-tools
    ports:
      - '${BIND_PORT:-8000}:${PORT:-8000}'
    volumes:
      - ${DEV_CONFIG_DIR:-./data/dev-config}:/app/dev-config
      - ${OUTPUT_DIR:-./data/output}:/app/output
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
    restart: unless-stopped
