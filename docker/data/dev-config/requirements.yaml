project:
  id: "demo-project"
  name: "示例项目需求收集"
  description: "演示需求收集工具的功能"

categories:
  - id: "basic-info"
    name: "基本信息"
    order: 1
    questions:
      - id: "q1"
        text: "您的企业名称是什么？"
        purpose: "用于项目标题和展示"
        type: text
        note: "请填写完整的企业名称"

      - id: "q2"
        text: "您需要哪些功能模块？"
        purpose: "确定开发范围"
        type: option
        options:
          - "产品展示"
          - "在线预约"
          - "用户管理"
          - "订单系统"
          - "自定义"
        allowCustom: true
        note: "可多选，选择'自定义'可自行填写"

      - id: "q3"
        text: "请设计您期望的首页布局"
        purpose: "了解客户的页面布局偏好"
        type: interactive
        interactiveConfig:
          defaultLayout: "home-default"
        note: "从右侧面板拖动组件到手机模拟器中进行设计"

  - id: "style"
    name: "风格偏好"
    order: 2
    questions:
      - id: "q4"
        text: "您偏好什么主色调？"
        purpose: "确定UI配色方案"
        type: option
        options:
          - "蓝色系"
          - "绿色系"
          - "红色系"
          - "暖橙色系"
        note: "选择一个最接近您期望的色调"

      - id: "q5"
        text: "请设计一个产品展示页面的布局"
        purpose: "了解客户对产品页面的详细需求"
        type: interactive
        interactiveConfig:
          defaultLayout: "product-default"
        note: "请在模拟器中拖动组件完成页面设计"
