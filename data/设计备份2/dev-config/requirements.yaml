project:
  id: "miniprogram-style"
  name: "小程序风格需求收集"
  description: "基于暗色工业风格的微信小程序UI组件配置"

categories:
  - id: "basic-info"
    name: "基本信息"
    order: 1
    questions:
      - id: "q1"
        text: "小程序名称是什么？"
        purpose: "用于导航栏标题"
        type: text
        note: "建议不超过10个字"
      - id: "q2"
        text: "主要色调偏好？"
        purpose: "确定主题色"
        type: option
        options:
          - "保持默认暗色主题 (#000000)"
          - "使用强调色 (#A3231F)"
          - "自定义颜色"
        allowCustom: true
        note: "当前风格为暗色工业风"

  - id: "page-design"
    name: "页面设计"
    order: 2
    questions:
      - id: "q3"
        text: "请设计首页布局"
        purpose: "了解页面布局偏好"
        type: interactive
        interactiveConfig:
          defaultLayout: "home-default"
        note: "拖动组件到模拟器中设计"
      - id: "q3b"
        text: "请设计产品详情页布局"
        purpose: "设计产品详情页面结构"
        type: interactive
        interactiveConfig:
          defaultLayout: "product-detail"
        note: "拖动组件到模拟器中设计"

  - id: "components"
    name: "组件配置"
    order: 3
    questions:
      - id: "q4"
        text: "需要哪些基础组件？"
        purpose: "确定可用组件范围"
        type: option
        options:
          - "导航栏"
          - "标签页"
          - "产品卡片"
          - "按钮组"
          - "分类列表"
          - "页脚"
        allowCustom: true
        note: "可多选"
